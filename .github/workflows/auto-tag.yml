name: Auto Tag

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-tag]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version and push tag
        run: |
          git fetch --tags

          # Find latest v* tag, default to v0.0.0 if none
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n 1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi

          # Bump patch version
          MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"

          echo "Latest tag: $LATEST → New tag: $NEW_TAG"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
