name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: pyinstaller asm_generator.spec

      - name: Prepare zip package
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/ASM-Generator/*" -DestinationPath "ASM-Generator-windows-${{ github.sha }}.zip" -Force

      - name: Upload EXE package
        uses: actions/upload-artifact@v4
        with:
          name: ASM-Generator-windows-${{ github.sha }}
          path: |
            ASM-Generator-windows-${{ github.sha }}.zip
            dist/ASM-Generator/ASM-Generator.exe
            dist/ASM-Generator/
          if-no-files-found: error
