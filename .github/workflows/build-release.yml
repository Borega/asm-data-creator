name: Build & Release

# Single source of truth for versioning + packaging.
# On every push to master/main this workflow:
#   1. computes the next patch version from the latest v* tag,
#   2. builds the Windows EXE with PyInstaller,
#   3. creates the git tag + a GitHub Release with the zipped build attached.
#
# It is triggered by your push (not by GITHUB_TOKEN), so it always runs.
# A previous design pushed the tag from a separate "auto-tag" job using
# GITHUB_TOKEN, which by GitHub policy does NOT trigger the release workflow —
# that is why no exe was ever published. Keeping everything in one job avoids it.
#
# Skip a run by putting [skip-release] in the commit message.

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

# Serialize releases so two quick pushes can't race for the same version tag.
concurrency:
  group: build-release
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: windows-latest
    if: "!contains(github.event.head_commit.message, '[skip-release]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        shell: bash
        run: |
          git fetch --tags --force

          # Latest v* tag, default to v0.0.0 if none exist yet.
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n 1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi

          MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"

          echo "Latest tag: $LATEST -> New tag: $NEW_TAG"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: pyinstaller asm_generator.spec

      - name: Prepare release zip
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/ASM-Generator/*" -DestinationPath "ASM-Generator-${{ steps.version.outputs.tag }}.zip" -Force

      - name: Create tag and GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ASM Generator ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ASM-Generator-${{ steps.version.outputs.tag }}.zip
